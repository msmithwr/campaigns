<svg xmlns="http://www.w3.org/2000/svg" width="600" height="200" viewBox="0 0 600 200" role="img" aria-labelledby="title desc">
  <title id="title">Windows SDP Campaign 1 CFO Email Banner</title>
  <desc id="desc">Cloudwrxs Windows cost optimisation banner for CFO audience.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fffaf0"/>
      <stop offset="0.55" stop-color="#f1f8f5"/>
      <stop offset="1" stop-color="#eaf5ff"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="7" stdDeviation="8" flood-color="#12352e" flood-opacity="0.13"/>
    </filter>
  </defs>
  <rect width="600" height="200" rx="18" fill="url(#bg)"/>
  <rect x="24" y="24" width="552" height="152" rx="16" fill="#ffffff" opacity="0.82"/>
  <g transform="translate(42 38)">
    <text x="0" y="0" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#12352e">cloudwrxs</text>
    <text x="0" y="26" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="700" letter-spacing="1.4" fill="#667873">WINDOWS EC2 SDP CAMPAIGN 1</text>
  </g>
  <g transform="translate(400 34)" filter="url(#shadow)">
    <rect x="0" y="0" width="128" height="94" rx="14" fill="#ffffff"/>
    <rect x="18" y="22" width="22" height="48" rx="5" fill="#fac775"/>
    <rect x="50" y="38" width="22" height="32" rx="5" fill="#b9e8d6"/>
    <rect x="82" y="14" width="22" height="56" rx="5" fill="#c5ddf7"/>
    <path d="M20 78 L106 78" stroke="#53625e" stroke-width="2"/>
    <text x="22" y="90" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#53625e">TCO / SDP model</text>
  </g>
  <text x="42" y="94" font-family="Arial, Helvetica, sans-serif" font-size="27" font-weight="800" fill="#101816">Reduce Windows cost</text>
  <text x="42" y="125" font-family="Arial, Helvetica, sans-serif" font-size="27" font-weight="800" fill="#0f6e56">without adding risk.</text>
  <text x="42" y="150" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#53625e">Free Windows Estate Assessment for finance leaders</text>
  <rect x="42" y="164" width="132" height="24" rx="12" fill="#ff9900"/>
  <text x="62" y="181" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" fill="#101816">Review TCO</text>
</svg>
