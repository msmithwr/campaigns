<svg xmlns="http://www.w3.org/2000/svg" width="600" height="200" viewBox="0 0 600 200" role="img" aria-labelledby="title desc">
  <title id="title">Windows SDP Campaign 1 ITM Email Banner</title>
  <desc id="desc">Cloudwrxs Windows operations banner for IT Infrastructure Manager audience.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#eefaf6"/>
      <stop offset="0.55" stop-color="#f5fbff"/>
      <stop offset="1" stop-color="#fff7ee"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="7" stdDeviation="8" flood-color="#12352e" flood-opacity="0.13"/>
    </filter>
  </defs>
  <rect width="600" height="200" rx="18" fill="url(#bg)"/>
  <rect x="24" y="24" width="552" height="152" rx="16" fill="#ffffff" opacity="0.82"/>
  <g transform="translate(42 38)">
    <text x="0" y="0" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#12352e">cloudwrxs</text>
    <text x="0" y="26" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="700" letter-spacing="1.4" fill="#667873">WINDOWS OPERATIONS HEALTH CHECK</text>
  </g>
  <g transform="translate(404 32)" filter="url(#shadow)">
    <rect x="0" y="0" width="124" height="96" rx="14" fill="#0f6e56"/>
    <circle cx="36" cy="34" r="13" fill="#b9e8d6"/>
    <circle cx="72" cy="34" r="13" fill="#b9e8d6"/>
    <circle cx="54" cy="66" r="13" fill="#b9e8d6"/>
    <path d="M36 47 L54 53 L72 47" stroke="#ffffff" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M36 34 L72 34" stroke="#ffffff" stroke-width="3" fill="none" opacity="0.8"/>
  </g>
  <text x="42" y="94" font-family="Arial, Helvetica, sans-serif" font-size="27" font-weight="800" fill="#101816">Simplify Windows</text>
  <text x="42" y="125" font-family="Arial, Helvetica, sans-serif" font-size="27" font-weight="800" fill="#0f6e56">operations on AWS.</text>
  <text x="42" y="150" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#53625e">Free health check for infrastructure teams</text>
  <rect x="42" y="164" width="142" height="24" rx="12" fill="#ff9900"/>
  <text x="62" y="181" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" fill="#101816">Request review</text>
